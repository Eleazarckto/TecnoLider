name: yj_delivery
description: YJ Delivery - Plataforma profesional de gestión de entregas
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  uuid: ^4.2.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1   # ⬅ AGREGAR

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#EF9F27"
  windows:
    generate: true
    icon_size: 256
  image_path: "assets/icon.png"
  adaptive_icon_background: "#12161C"  # color oscuro de fondo (Android)
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
